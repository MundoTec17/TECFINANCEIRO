const DB = {
  get(k, d=null){
    try{
      const v = localStorage.getItem(k);
      return v !== null ? JSON.parse(v) : d;
    }catch{
      return d;
    }
  },

  set(k, v){
    try{
      const backup = localStorage.getItem(k);
      if(backup){
        localStorage.setItem(k + '_backup', backup);
      }

      localStorage.setItem(k, JSON.stringify(v));

      if(!LOCAL_ONLY_KEYS.has(k)){
        this.syncCloud(k, v);
      }
    }catch(e){
      console.error('❌ Erro ao salvar no localStorage:', e);
    }
  },

  async syncCloud(k, v){
    try{
      await db.collection('app').doc(k).set({
        value: v,
        updatedAt: new Date().toISOString()
      });
      console.log('☁️ Backup salvo:', k);
    }catch(e){
      console.error('❌ Erro ao salvar no Firebase:', e);
    }
  },

  del(k){
    try{
      localStorage.removeItem(k);

      if(LOCAL_ONLY_KEYS.has(k)) return;

      this.syncDelete(k);
    }catch(e){
      console.error('❌ Erro ao remover dado:', e);
    }
  },

  async syncDelete(k){
    try{
      await db.collection('app').doc(k).delete();
      console.log('🗑️ Removido da nuvem:', k);
    }catch(e){
      console.error('❌ Erro ao remover do Firebase:', e);
    }
  }
};

async function syncFromFirebase(key){
  try{
    const doc = await db.collection('app').doc(key).get();

    if(doc.exists){
      const data = doc.data().value;
      localStorage.setItem(key, JSON.stringify(data));
      console.log('🔄 Sincronizado:', key);
      return data;
    }
  }catch(e){
    console.error('Erro ao sincronizar:', e);
  }

  return null;
}

// =====================================================

async function hashPassword(text){
  const encoder = new TextEncoder();
  const data = encoder.encode(text);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  return `sha256:${hashHex}`;
}

async function migrateLegacyUsersPasswords(){
  const users = DB.get('fin_users', []) || [];
  let changed = false;

  for(const user of users){
    if(user.password && !user.passwordHash){
      user.passwordHash = await hashPassword(user.password);
      delete user.password;
      changed = true;
    }
  }

  if(changed){
    saveUsers(users);
    console.log('🔐 Usuários legados migrados para passwordHash.');
  }
}

function saveUsers(list){

function getUserById(id){
  return getUsers().find(u => u.id === id) || null;

async function authenticate(login, pass){
  const users = getUsers();
  const passHash = await hashPassword(pass);

  for(const user of users){
    if(user.login !== login) continue;
    if(user.active === false) continue;

    if(user.id === '__master__' && user.password === pass){
      return user;
    }

    if(user.passwordHash && user.passwordHash === passHash){
      return user;
    }

    if(user.password && user.password === pass){
      return user;
    }
  }

  return null;
}

// =====================================================
// ADICIONAR DÍVIDA (COM RETRY)
// =====================================================
async function addDebt(d){
  const list = getDebts();
  const installmentList = [];
  const start = new Date(d.startDate + 'T12:00:00');

  for(let i = 0; i < d.installments; i++){
    const due = new Date(start);
    due.setMonth(due.getMonth() + i);

    installmentList.push({
      num: i + 1,
      dueDate: due.toISOString().split('T')[0],
      paid: false,
      paidDate: null
    });
  }

  list.push({
    ...d,
    id: genId(),
    installmentList
  });

  await saveDebts(list);
}

// =====================================================
// ATUALIZAR DÍVIDA (COM RETRY)
// =====================================================
async function updateDebt(debt){
  const list = getDebts();
  const i = list.findIndex(d => d.id === debt.id);

  if (i >= 0) list[i] = debt;

  await saveDebts(list);
}

// =====================================================
// REMOVER DÍVIDA (COM RETRY)
// =====================================================
async function delDebt(id){
  const list = getDebts().filter(d => d.id !== id);
  await saveDebts(list);
}

function fmtDate(s){
  if(!s) return '-';
  const [y,m,d] = s.split('-');
  return `${d}/${m}/${y}`;
}

function today(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

        <div id="page-content" class="p-3 sm:p-4 md:p-6 fade-in"></div>
      </main>
    </div>
  </div>`;

  renderPage(page);
}

function toggleSidebar(){
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('overlay');
  if(!sb || !ov) return;
  sb.classList.toggle('-translate-x-full');
  ov.classList.toggle('hidden');
}

function closeSidebar(){
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('overlay');
  if(!sb || !ov) return;
  sb.classList.add('-translate-x-full');
  ov.classList.add('hidden');
}

function renderPage(p){
  const c=document.getElementById('page-content');
  if(!c) return;

  ({
    inicio:renderTelaInicial,
    dashboard:renderDashboard,
    cadastro:renderCadastro, 
    financeiro:renderFinanceiro,
    servicos:renderServicos,
    cashflow:renderCashFlow,
    debts:renderDebts,
    investments:renderInvestments,
    reports:renderReports,
    users:renderUsers,
    permissionsPage:renderPermissions
  }[p]||renderDashboard)(c);
}

      </div>

    </div>
  </div>`;
  document.getElementById('moverlay').addEventListener('click',e=>{if(e.target.id==='moverlay')closeModal()});

function showConfirm(msg,onOk,dangerLbl='Excluir'){
  document.getElementById('modal-container').innerHTML=`
  <div class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4" id="moverlay">
    <div class="max-w-sm w-full bg-gray-800 rounded-2xl shadow-2xl border border-gray-700/60 fade-in p-6">
      <div class="flex items-start gap-4 mb-5">
        <div class="w-10 h-10 rounded-full bg-red-500/20 flex items-center justify-center shrink-0">
          <i class="fas fa-triangle-exclamation text-red-400"></i>
        </div>
        <div>
          <h3 class="font-semibold text-white mb-1">Confirmar ação</h3>
          <p class="text-sm text-gray-400">${msg}</p>
        </div>
      </div>
      <div class="flex gap-3 justify-end">
        <button onclick="closeModal()" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm text-gray-300 transition">Cancelar</button>
        <button id="confirm-ok" class="px-5 py-2 bg-red-600 hover:bg-red-500 rounded-lg text-sm font-semibold transition">${dangerLbl}</button>
      </div>
    </div>
  </div>`;
  document.getElementById('confirm-ok').addEventListener('click',()=>{closeModal();onOk()});
  document.getElementById('moverlay').addEventListener('click',e=>{if(e.target.id==='moverlay')closeModal()});
}

function closeModal(){
  document.getElementById('modal-container').innerHTML='';
}

function mErr(msg){
  const e=document.getElementById('modal-err');
  if(e){
    e.textContent=msg;
    e.classList.remove('hidden');
  }
}

function renderDashboard(c){
  const txs=getTx(), debts=getDebts(), invs=getInvs();
  const income=txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense=txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const balance=income-expense;
  const totalInv=invs.reduce((s,i)=>s+i.investedAmount,0);

  const now=new Date(); now.setHours(0,0,0,0);
  const next30=new Date(now); next30.setDate(next30.getDate()+30);
  const upcoming=[];

  debts.forEach(d=>d.installmentList.forEach(inst=>{
    if(!inst.paid){
      const due=new Date(inst.dueDate+'T12:00:00');
      if(due<=next30) upcoming.push({...inst,debtName:d.name,amount:d.installmentAmount});
    }
  }));

  upcoming.sort((a,b)=>a.dueDate.localeCompare(b.dueDate));

  const months=[];
  for(let i=5;i>=0;i--){
    const d=new Date();
    d.setMonth(d.getMonth()-i);
    months.push({y:d.getFullYear(),m:d.getMonth()});
  }

  const mbInc=months.map(mo=>txs.filter(t=>t.type==='income'&&new Date(t.date).getFullYear()===mo.y&&new Date(t.date).getMonth()===mo.m).reduce((s,t)=>s+t.amount,0));
  const mbExp=months.map(mo=>txs.filter(t=>t.type==='expense'&&new Date(t.date).getFullYear()===mo.y&&new Date(t.date).getMonth()===mo.m).reduce((s,t)=>s+t.amount,0));
  const mbBal=mbInc.map((v,i)=>v-mbExp[i]);

  c.innerHTML=`
  <div class="mb-5">
    <h1 class="text-xl md:text-2xl font-bold text-white">Dashboard</h1>
    <p class="text-gray-400 text-sm">Visão geral das suas finanças</p>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-3 mb-5">
    <div class="card-green rounded-2xl p-4 shadow-lg">
      <div class="flex items-center justify-between mb-2">
        <p class="text-green-100 text-xs font-medium">Total de Entradas</p>
        <div class="w-8 h-8 rounded-lg bg-white/20 flex items-center justify-center shrink-0"><i class="fas fa-arrow-trend-up text-white text-xs"></i></div>
      </div>
      <p class="text-lg md:text-xl font-bold text-white break-words">${fmt(income)}</p>
    </div>

    <div class="card-red rounded-2xl p-4 shadow-lg">
      <div class="flex items-center justify-between mb-2">
        <p class="text-red-100 text-xs font-medium">Total de Saídas</p>
        <div class="w-8 h-8 rounded-lg bg-white/20 flex items-center justify-center shrink-0"><i class="fas fa-arrow-trend-down text-white text-xs"></i></div>
      </div>
      <p class="text-lg md:text-xl font-bold text-white break-words">${fmt(expense)}</p>
    </div>

    <div class="card-blue rounded-2xl p-4 shadow-lg">
      <div class="flex items-center justify-between mb-2">
        <p class="text-blue-100 text-xs font-medium">Saldo Atual</p>
        <div class="w-8 h-8 rounded-lg bg-white/20 flex items-center justify-center shrink-0"><i class="fas fa-wallet text-white text-xs"></i></div>
      </div>
      <p class="text-lg md:text-xl font-bold text-white break-words">${fmt(balance)}</p>
    </div>

    <div class="card-purple rounded-2xl p-4 shadow-lg">
      <div class="flex items-center justify-between mb-2">
        <p class="text-purple-100 text-xs font-medium">Total Investido</p>
        <div class="w-8 h-8 rounded-lg bg-white/20 flex items-center justify-center shrink-0"><i class="fas fa-chart-pie text-white text-xs"></i></div>
      </div>
      <p class="text-lg md:text-xl font-bold text-white break-words">${fmt(totalInv)}</p>
    </div>
  </div>

  <div class="grid grid-cols-1 xl:grid-cols-3 gap-4">
    <div class="xl:col-span-2 bg-gray-800 rounded-2xl p-4 md:p-5 border border-gray-700/60 overflow-hidden">
      <h2 class="text-sm font-semibold text-gray-300 mb-4">Evolução do Saldo — Últimos 6 meses</h2>
      <div class="w-full overflow-x-auto">
        <canvas id="dash-chart" height="110"></canvas>
      </div>
    </div>

    <div class="bg-gray-800 rounded-2xl p-4 md:p-5 border border-gray-700/60">
      <h2 class="text-sm font-semibold text-gray-300 mb-3">Parcelas nos próximos 30 dias</h2>
      ${upcoming.length===0?'<p class="text-gray-500 text-sm py-6 text-center">Nenhuma parcela nos próximos 30 dias.</p>':`
      <div class="space-y-2 max-h-56 overflow-y-auto pr-1">
        ${upcoming.map(inst=>{
          const due=new Date(inst.dueDate+'T12:00:00');
          const ov=due<now;
          return`<div class="flex items-center justify-between p-2.5 rounded-xl ${ov?'bg-red-500/10 border border-red-500/20':'bg-gray-700/60'} gap-2">
            <div class="min-w-0 flex-1">
              <p class="text-xs font-medium text-white truncate">${inst.debtName}</p>
              <p class="text-xs ${ov?'text-red-400':'text-gray-500'}">Parc. ${inst.num} · ${fmtDate(inst.dueDate)}${ov?' · Vencida':''}</p>
            </div>
            <p class="text-xs font-semibold text-white shrink-0 text-right">${fmt(inst.amount)}</p>
          </div>`;
        }).join('')}
      </div>`}
    </div>
  </div>`;

  const ctx=document.getElementById('dash-chart').getContext('2d');
  UI_STATE.chartReg.dash=new Chart(ctx,{
    type:'line',
    data:{
      labels:months.map(m=>monthLabel(m.m)+'/'+String(m.y).slice(2)),
      datasets:[{
        label:'Saldo',
        data:mbBal,
        borderColor:'#6366f1',
        backgroundColor:'rgba(99,102,241,.12)',
        borderWidth:2,
        fill:true,
        tension:.4,
        pointBackgroundColor:'#6366f1',
        pointRadius:4
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#6b7280',font:{size:11}}},
        y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#6b7280',font:{size:11},callback:v=>fmt(v)}}
      }
    }
  });
}

function renderCashFlow(c){
  const all=getTx();
  const filters = UI_STATE.cashflowFilters;

  let list=all.filter(t=>{
    if(filters.type&&t.type!==filters.type)return false;
    if(filters.category&&t.category!==filters.category)return false;
    if(filters.from&&t.date<filters.from)return false;
    if(filters.to&&t.date>filters.to)return false;
    return true;
  }).sort((a,b)=>b.date.localeCompare(a.date));

  const inc=all.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);

function toggleInst(id){
  const el=document.getElementById(`inst-${id}`);
  const ch=document.getElementById(`chev-${id}`);
  el.classList.toggle('hidden');
  ch.className=el.classList.contains('hidden')?'fas fa-chevron-down':'fas fa-chevron-up';
}

function toggleInstPaid(debtId,idx){
  const debts=getDebts();
  const debt=debts.find(d=>d.id===debtId);
  if(!debt) return;

  debt.installmentList[idx].paid = !debt.installmentList[idx].paid;
  debt.installmentList[idx].paidDate = debt.installmentList[idx].paid ? today() : null;

  updateDebt(debt);
  renderPage('debts');
}

function previewInst(){
  const total=parseFloat(document.getElementById('d-total')?.value||0);
  const n=parseInt(document.getElementById('d-n')?.value||0);
  const rate=(parseFloat(document.getElementById('d-rate')?.value||0))/100;

  if(total>0&&n>0){
    const amt=rate>0?total*(rate*Math.pow(1+rate,n))/(Math.pow(1+rate,n)-1):total/n;
    document.getElementById('d-prev-val').textContent=fmt(amt);
    document.getElementById('d-preview').classList.remove('hidden');
  }else{
    document.getElementById('d-preview').classList.add('hidden');
  }
}

function saveDebt(){
  const name=document.getElementById('d-name').value.trim();
  const total=parseFloat(document.getElementById('d-total').value);
  const n=parseInt(document.getElementById('d-n').value);
  const startDate=document.getElementById('d-start').value;
  const rate=(parseFloat(document.getElementById('d-rate').value||0))/100;

  if(!name || isNaN(total) || total<=0 || isNaN(n) || n<1 || !startDate){
    return mErr('Preencha todos os campos obrigatórios.');
  }

  const installmentAmount=rate>0?total*(rate*Math.pow(1+rate,n))/(Math.pow(1+rate,n)-1):total/n;
  addDebt({name,totalAmount:total,installments:n,startDate,interestRate:rate*100,installmentAmount});
  closeModal();
  renderPage('debts');
}

  showConfirm('Tem certeza que deseja excluir esta dívida e todas as parcelas?',()=>{delDebt(id);renderPage('debts')});
}

async function saveUser(){
  const name=document.getElementById('u-name').value.trim();
  const login=document.getElementById('u-login').value.trim();
  const role=document.getElementById('u-role').value;
  const pass=document.getElementById('u-pass').value;
  const id=document.getElementById('u-id').value;

  if(!name||!login) return mErr('Nome e login são obrigatórios.');
  if(!id&&!pass) return mErr('A senha é obrigatória para novos usuários.');

  const users=DB.get('fin_users',[])||[];
  const dup=users.find(u=>u.login===login&&u.id!==id);
  if(dup) return mErr('Este login já está em uso por outro usuário.');

  if(id){
    const idx=users.findIndex(u=>u.id===id);
    if(idx>=0){
      users[idx].name=name;
      users[idx].login=login;
      users[idx].role=role;

      if(role==='admin'){
        users[idx].permissions={...ADMIN_FIXED_PERMISSIONS};
      }else{
        users[idx].permissions = {
          ...DEFAULT_STANDARD_PERMISSIONS,
          ...(users[idx].permissions||{})
        };
      }

      if(pass){
        users[idx].passwordHash=await hashPassword(pass);
        delete users[idx].password;
      }
    }
  }else{
    const permissions = role==='admin'
      ? {...ADMIN_FIXED_PERMISSIONS}
      : {...DEFAULT_STANDARD_PERMISSIONS};

    users.push({
      id:genId(),
      name,
      login,
      passwordHash:await hashPassword(pass),
      role,
      active:true,
      permissions
    });
  }

  saveUsers(users);

  if(currentUser && id && currentUser.id === id){
    currentUser = getUserById(id) || currentUser;
  }

  closeModal();
  renderPage('users');
}

function toggleActive(id){
  const users=DB.get('fin_users',[])||[];
  const u=users.find(x=>x.id===id);

  if(u){
    u.active = (u.active === false) ? true : false;
    saveUsers(users);

    if(currentUser && currentUser.id === id){
      currentUser = getUserById(id);
      if(currentUser && currentUser.active === false){
        doLogout();
        return;
      }
    }

    renderPage('users');
  }
}

// =====================================================
// STATUS DE SINCRONIZAÇÃO (UI GLOBAL)
// =====================================================

const SyncStatus = {
  IDLE: 'idle',
  SAVING: 'saving',
  SYNCED: 'synced',
  PENDING: 'pending',
  ERROR: 'error',
  RETRYING: 'retrying',
  OFFLINE: 'offline'
};

function updateSyncStatus(status, extraText = '') {
  const el = document.getElementById('sync-status');
  if (!el) return;

  const labels = {
    idle: 'Aguardando',
    saving: 'Salvando...',
    synced: 'Sincronizado',
    pending: 'Pendente',
    error: 'Erro na sincronização',
    retrying: 'Tentando novamente...',
    offline: 'Sem conexão'
  };

  const hideWhen = ['idle', 'synced'];

  el.className = `sync-status ${status}`;
  el.textContent = `Status: ${extraText || labels[status] || '...'}`;

  if (hideWhen.includes(status)) {
    el.classList.add('hidden');
  } else {
    el.classList.remove('hidden');
  }
}

// =====================================================
// TOAST GLOBAL DO SISTEMA
// =====================================================

function showToast(message, type = 'info', duration = 2500) {
  const toast = document.getElementById('app-toast');
  if (!toast) return;

  toast.className = `toast ${type}`;
  toast.textContent = message;

  clearTimeout(toast._timer);

  toast._timer = setTimeout(() => {
    toast.className = 'toast hidden';
  }, duration);
}

// =====================================================
// EXECUÇÃO PADRÃO DE AÇÕES COM STATUS
// =====================================================

async function runWithSyncFeedback(actionFn, messages = {}) {
  const {
    loading = 'Salvando...',
    success = 'Operação concluída com sucesso.',
    error = 'Erro ao concluir a operação.'
  } = messages;

  try {
    updateSyncStatus('saving', loading);

    const result = await actionFn();

    updateSyncStatus('synced');
    showToast(success, 'success', 2500);

    return result;
  } catch (err) {
    console.error('Erro na operação:', err);

    updateSyncStatus('error');
    showToast(error, 'error', 3500);

    throw err;
  }
}

// =====================================================
// EXECUÇÃO COM RETRY AUTOMÁTICO
// =====================================================

async function runWithRetry(actionFn, messages = {}, options = {}) {
  const {
    loading = 'Salvando...',
    success = 'Operação concluída com sucesso.',
    error = 'Erro ao concluir a operação.',
    retrying = 'Tentando novamente...'
  } = messages;

  const {
    maxRetries = 3,
    retryDelay = 2000
  } = options;

  let attempt = 0;

  while (attempt <= maxRetries) {
    try {
      if (!navigator.onLine) {
        updateSyncStatus('offline');
        showToast('Sem conexão. A ação será tentada novamente.', 'warning', 2500);
        throw new Error('offline');
      }

      if (attempt === 0) {
        updateSyncStatus('saving', loading);
      } else {
        updateSyncStatus('retrying', `${retrying} (${attempt}/${maxRetries})`);
        showToast(`${retrying} (${attempt}/${maxRetries})`, 'warning', 2000);
      }

      const result = await actionFn();

      updateSyncStatus('synced');
      showToast(success, 'success', 2500);

      return result;
    } catch (err) {
      attempt++;

      console.error(`Tentativa ${attempt} falhou:`, err);

      if (attempt > maxRetries) {
        updateSyncStatus('error', 'Erro na sincronização');
        showToast(error, 'error', 3500);
        throw err;
      }

      await new Promise(resolve => setTimeout(resolve, retryDelay));
    }
  }
}

// =====================================================
// PERSISTÊNCIA COM FEEDBACK DE SINCRONIZAÇÃO
// =====================================================

async function persistDataWithRetry(key, value, messages = {}, options = {}) {
  try {
    const rawBackup = localStorage.getItem(key);

    if (rawBackup !== null) {
      localStorage.setItem(`${key}_backup`, rawBackup);
    }

    localStorage.setItem(key, JSON.stringify(value));

    if (LOCAL_ONLY_KEYS.has(key)) {
      return true;
    }

    await runWithRetry(
      async () => {
        await db.collection('app').doc(key).set({
          value,
          updatedAt: new Date().toISOString()
        });
      },
      messages,
      options
    );

    return true;
  } catch (err) {
    console.error(`Erro ao persistir ${key}:`, err);
    throw err;
  }
}

const APP_VERSION = '1.0.2';

let updateToastDismissed = false;

// =====================================================
// MOSTRAR TOAST DE NOVA VERSÃO
// =====================================================
function showUpdateToast(newVersion) {
  const toast = document.getElementById('update-toast');
  if (!toast) return;
  if (updateToastDismissed) return;

  toast.className = 'toast info';

  toast.innerHTML = `
    <div><strong>Nova versão disponível</strong></div>
    <div style="margin-top:6px; font-size:13px;">
      Versão atual: ${APP_VERSION}<br>
      Nova versão: ${newVersion}
    </div>

    <div class="update-toast-actions">
      <button class="update-toast-btn primary" onclick="applyAppUpdate()">
        Clique aqui para atualizar
      </button>

      <button class="update-toast-btn close" onclick="dismissUpdateToast()">
        X
      </button>
    </div>
  `;
}

// =====================================================
// FECHAR TOAST
// =====================================================
function dismissUpdateToast() {
  const toast = document.getElementById('update-toast');
  if (!toast) return;

  updateToastDismissed = true;
  toast.className = 'toast hidden';
  toast.innerHTML = '';
}

// =====================================================
// ATUALIZAR APP
// =====================================================
function applyAppUpdate() {
  updateToastDismissed = false;
  window.location.reload();
}

// =====================================================
// VERIFICAR NOVA VERSÃO
// =====================================================
async function checkForAppUpdate() {
  try {
    const response = await fetch(`version.json?t=${Date.now()}`, {
      cache: 'no-store'
    });

    if (!response.ok) return;

    const data = await response.json();
    const remoteVersion = String(data.version || '').trim();

    if (!remoteVersion) return;

    if (remoteVersion !== APP_VERSION) {
      showUpdateToast(remoteVersion);
    }

  } catch (err) {
    console.warn('Erro ao verificar versão:', err);
  }
}

// =====================================================
// INICIAR MONITORAMENTO
// =====================================================
function startVersionMonitor() {
  checkForAppUpdate();

  setInterval(() => {
    checkForAppUpdate();
  }, 60000); // verifica a cada 1 minuto
}
// =====================================================
// INICIALIZAÇÃO DO SISTEMA
// =====================================================
async function iniciarSistema(){
  updateSyncStatus('saving');

  await syncFromFirebase('fin_users');
  await syncFromFirebase('fin_transactions');
  await syncFromFirebase('fin_debts');
  await syncFromFirebase('fin_investments');

  await migrateLegacyUsersPasswords();

  currentUser = getUserById(DB.get('fin_session', null));

  console.log('🚀 Sistema sincronizado!');

  updateSyncStatus('synced');

  renderApp();
  // =====================================================
  // INICIAR MONITORAMENTO DE VERSÃO
  // =====================================================
  startVersionMonitor();
}

iniciarSistema();
